version: '3.8'

services:

  # ── Qdrant Vector Database ──────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: govintel-qdrant
    ports:
      - "6333:6333"     # REST API
      - "6334:6334"     # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - govintel-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: govintel-backend
    ports:
      - "8000:8000"
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - LLAMA_PARSE_API_KEY=${LLAMA_PARSE_API_KEY:-}
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION_NAME=${QDRANT_COLLECTION_NAME:-gov_policies}
      - USE_LOCAL_LLM=${USE_LOCAL_LLM:-false}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - LOCAL_LLM_MODEL=${LOCAL_LLM_MODEL:-llama3:8b-instruct-q4_K_M}
      - USE_CLOUD_EMBEDDINGS=${USE_CLOUD_EMBEDDINGS:-false}
      - GEMINI_LLM_MODEL=${GEMINI_LLM_MODEL:-models/gemini-2.5-flash}
      - GEMINI_VISION_MODEL=${GEMINI_VISION_MODEL:-models/gemini-2.5-flash}
      - SCRAPER_CRON_HOUR=${SCRAPER_CRON_HOUR:-2}
      - SCRAPER_CRON_MINUTE=${SCRAPER_CRON_MINUTE:-0}
    volumes:
      - ./data:/app/data
      - model_cache:/root/.cache/huggingface
    depends_on:
      qdrant:
        condition: service_healthy
    networks:
      - govintel-net
    restart: unless-stopped

  # ── Streamlit Frontend ───────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: govintel-frontend
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - govintel-net
    restart: unless-stopped

  # ── Ollama Local LLM (optional — uncomment to enable) ──────────────────────
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: govintel-ollama
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   networks:
  #     - govintel-net
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: all
  #             capabilities: [gpu]

volumes:
  qdrant_data:
  model_cache:
  # ollama_data:

networks:
  govintel-net:
    driver: bridge
